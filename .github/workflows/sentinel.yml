name: AECweb Sentinel Daily Briefing

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Runs at 08:14, 16:14, and 22:14 UTC (Approx 3AM, 11AM, 5PM CDT)
    - cron: '14 8,16,22 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-sentinel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Ensure we get the full history to push back

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run AECweb Sentinel Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/sentinel.py

    - name: Commit and Push Updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "AECweb Sentinel"
        git add blog.json
        git diff --staged --quiet || (git commit -m "Automated Intelligence Update [Sentinel]" && git push)

name: AECweb Sentinel Daily Briefing

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Runs at 08:14 UTC every day, which is 3:14 AM CDT to avoid top-of-the-hour server dropouts
    - cron: '14 8 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-sentinel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Ensure we get the full history to push back

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run AECweb Sentinel Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/sentinel.py > debug.log 2>&1

    - name: Commit and Push Updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "AECweb Sentinel"
        git add blog.json debug.log
        git commit -m "Automated Intelligence Update [Sentinel]" || echo "No changes"
        git push
